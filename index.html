<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <style>

        @keyframes fadeIn {

            from {

                opacity: 0;
                transform: translateY(20px);

            }

            to {

                opacity: 1;
                transform: translateY(0);

            }

        }

    </style>

    <title>Notes App</title>

</head>

<body class="bg-gradient-to-br from-purple-950 via-mauve-800 to-fuchsia-900 min-h-screen flex justify-center p-4">

    <div class="flex flex-col gap-10 w-full max-w-7xl">

        <!-- Heading -->

        <h2
            class="text-white font-bold font-mono text-4xl mt-10 text-center"
        >

            📕 NOTE TAKING APP

        </h2>


        <!-- Subtitle -->

        <div class="text-xl">

            <p class="text-white">

                Add a new note :

            </p>

        </div>


        <!-- Title Section -->

        <div
            class="flex items-center gap-4 bg-mauve-500 w-full px-6 py-6 rounded-xl shadow-lg"
        >

            <p class="text-xl font-bold text-black">

                Title

            </p>

            <div class="flex-1">

                <input
                    type="text"
                    id="notetitle"
                    placeholder="Enter title..."
                    class="w-full bg-white rounded-lg px-4 py-3 outline-none"
                >

            </div>

        </div>


        <!-- Description Section -->

        <div
            class="flex flex-col gap-3 bg-mauve-500 w-full px-6 py-6 rounded-xl shadow-lg"
        >

            <p class="text-xl font-bold text-black">

                Description

            </p>

            <div>

                <textarea
                    id="descrip"
                    placeholder="Write your note here..."
                    class="w-full bg-white rounded-lg px-4 py-3 h-60 outline-none resize-none"
                ></textarea>

            </div>

        </div>


        <!-- Add Button -->

        <div class="w-full flex justify-start">

            <button
                id="addbtn"
                class="text-2xl font-mono font-bold bg-mauve-400 hover:bg-mauve-300 rounded-lg shadow-lg px-4 py-2 transition hover:scale-105"
            >

                + Add Note

            </button>

        </div>


        <!-- Notes Container -->

        <div
            id="notescontainer"
            class="grid grid-cols-1 md:grid-cols-2 gap-8 w-full"
        ></div>


      
    </div>

    <script src="script.js"></script>

</body>

</html>
